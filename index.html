async function loadScoreData() {
  if (SCORE_DATA) return SCORE_DATA;
  let ak = {}, ls = null, ball = null;
  try { ak = (await (await fetch('/data/answer_key.json')).json()).answers || {}; } catch {}
  try { ls = await (await fetch('/data/live_stats.json')).json(); } catch {}
  try { ball = await (await fetch('/data/ball_stats.json')).json(); } catch {}
  const key = JSON.parse(JSON.stringify(ak));
  const live = new Set();
  const setLive = (k, v, isLive) => { if (key[k] == null) { key[k] = v; if (isLive) live.add(k); } };
  if (ls) {
    const complete = !!ls.group_stage_complete;
    key.q8 = key.q8 || {};
    Object.entries(ls.groups || {}).forEach(([L, g]) => {
      if (!key.q8[L]) { key.q8[L] = g.provisional_order; if (!complete) live.add('q8'); }
    });
    setLive('q9', ls.group_goals_total, !complete);
    setLive('q11', ls.tournament_goals_total, true);
    setLive('q12', ls.penalty_shootouts, true);
    setLive('q13', ls.extra_time_matches, true);
    if (ls.hat_trick_in_group_stage) setLive('q10', 'Yes', false); // locked once it happens
    const gt = ls.goal_timing || {};
    setLive('q14', gt.added_time_goals, true);
    setLive('q16', gt.fastest_goal_seconds, true);
    if (ls.top_scorers && ls.top_scorers[0]) setLive('q18_player', ls.top_scorers[0].player, true); // Golden Boot = q18
  }
  if (ball && ball.q15_longest_range_m != null) setLive('q15', ball.q15_longest_range_m, true);
  SCORE_DATA = { key, live, ls };
  return SCORE_DATA;
}

// Outlook for a still-live question: is the current score likely to hold? Honest,
// projection-based where the stat is projectable; directional where it's monotonic.
const TOTAL_GROUP_MATCHES = 72, TOTAL_MATCHES = 104;
function bandOutlook(qid, projected, note) {
  const opts = BANDS[qid].opts;
  const pi = bandIndexFor(projected, opts), ui = opts.indexOf(answers[qid]);
  if (pi < 0 || ui < 0) return { cls: 'amber', label: note };
  const d = Math.abs(pi - ui);
  const verdict = d === 0 ? t('sc_hold_ok') : (d === 1 ? t('sc_hold_maybe') : t('sc_hold_no'));
  return { cls: d === 0 ? 'green' : (d === 1 ? 'amber' : 'red'), label: `${note} · ${verdict}` };
}
function scOutlook(qid) {
  const ls = SCORE_DATA && SCORE_DATA.ls; if (!ls) return null;
  const played = ls.matches_played || 0;
  const gt = ls.goal_timing || {};
  if (qid === 'q9' && played) { const p = Math.round(ls.group_goals_total / played * TOTAL_GROUP_MATCHES); return bandOutlook('q9', p, `${t('sc_trend')} ~${p}`); }
  if (qid === 'q14' && played && gt.added_time_goals != null) { const p = Math.round(gt.added_time_goals / played * TOTAL_MATCHES); return bandOutlook('q14', p, `${t('sc_onpace')} ~${p} ${t('sc_byfinal')}`); }
  // Knockout-only paces: extrapolate the knockout rate over all 32 knockout games.
  const koPlayed = played - TOTAL_GROUP_MATCHES, KO_TOTAL = TOTAL_MATCHES - TOTAL_GROUP_MATCHES;
  if (qid === 'q11' && koPlayed > 0 && ls.tournament_goals_total != null) { const p = Math.round(ls.group_goals_total + (ls.tournament_goals_total - ls.group_goals_total) / koPlayed * KO_TOTAL); return bandOutlook('q11', p, `${t('sc_onpace')} ~${p} ${t('sc_byfinal')}`); }
  if (qid === 'q12' && koPlayed > 0 && ls.penalty_shootouts != null) { const p = Math.round(ls.penalty_shootouts / koPlayed * KO_TOTAL); return bandOutlook('q12', p, `${t('sc_onpace')} ~${p} ${t('sc_byfinal')}`); }
  if (qid === 'q13' && koPlayed > 0 && ls.extra_time_matches != null) { const p = Math.round(ls.extra_time_matches / koPlayed * KO_TOTAL); return bandOutlook('q13', p, `${t('sc_onpace')} ~${p} ${t('sc_byfinal')}`); }
  if (qid === 'q16') return { cls: 'amber', label: t('sc_faster') };
  if (qid === 'q15') return { cls: 'amber', label: t('sc_longer') };
  if (qid === 'q8') return { cls: 'amber', label: `${TOTAL_GROUP_MATCHES - played} ${t('sc_games_left')}` };
  if (qid === 'q18_player') return { cls: 'amber', label: t('sc_boot_open') };
  return null;
}

// Short labels + display order for the scorecard. Order = how rows are listed.
const SC_LABELS = {
  q9:'Group-stage goals', q10:'Hat-trick in group stage?', q8:'Group order · 12 groups',
  q15:'Longest-range goal', q16:'Fastest goal', q14:'Added-time goals',
  q18_player:'Golden Boot · top scorer', q19_player:'Young Player', q17_player:'Golden Ball',
  q20_player:'Golden Glove', q11:'Total tournament goals', q12:'Penalty shootouts',
  q13:'Extra-time matches', q1:'Champion', q2:'Runner-up', q3:'Other two semifinalists',
  q4:'Best-finishing host', q5:'Top African team', q6:'Top Asian team', q7:'Cinderella (3rd place)',
  q21_player:'Scores in the final', q22_player:'Most goals after groups',
};
const SC_UNIT = { q15:'m', q16:'s' };
// Bilingual short label per question: q8 has its own short key; the rest reuse the
// already-translated form question labels (q17_player → q17, etc.).
function scLabel(qid) { return qid === 'q8' ? t('sc_q8') : t(qid.replace('_player', '')); }

// This entry's pick, formatted for display.
function scPick(qid) {
  if (qid === 'q3') return [answers.q3a, answers.q3b].filter(Boolean).map(teamLabel).join(' + ') || '—';
  if (qid === 'q8') return null;
  if (BANDS[qid]) return answers[qid] || '—';
  if (qid === 'q10') return answers.q10 || '—';
  const pk = qid.endsWith('_player') ? answers[qid] : (answers[qid] && teamLabel(answers[qid]));
  return pk || '—';
}
// The real / current answer, short form.
function scActual(qid, key) {
  if (qid === 'q3') return [key.q3a, key.q3b].filter(Boolean).map(teamLabel).join(' + ') || '—';
  if (qid === 'q10') return key.q10 || '—';
  if (BANDS[qid]) return key[qid] != null ? `${key[qid]}${SC_UNIT[qid] || ''}` : '—';
  if (qid.endsWith('_player')) return key[qid] || '—';
  return key[qid] ? teamLabel(key[qid]) : '—';
}
function scStatus(bd) { return bd.pts >= bd.max ? 'hit' : (bd.pts > 0 ? 'partial' : 'miss'); }

// Build one scored row.
function scRow(qid, bd, key, isLive) {
  const st = scStatus(bd);
  const icon = st === 'hit' ? '✓' : (st === 'partial' ? '≈' : '✗');
  const dcl = st === 'hit' ? 'ok' : (st === 'partial' ? 'par' : 'no');
  const tag = isLive ? `<span class="tag live">· ${t('sc_live')}</span>` : `<span class="tag locked">· ${t('sc_locked')}</span>`;
  let detail;
  if (qid === 'q8') {
    detail = t('sc_q8_detail');
  } else {
    detail = `${t('sc_picked')} <b>${escapeHtml(scPick(qid))}</b> · <span class="${dcl}">${escapeHtml(scActual(qid, key))} ${icon}</span>`;
  }
  const ptsTxt = bd.pts > 0 ? `+${Math.round(bd.pts)}` : '0';
  const out = isLive ? scOutlook(qid) : null;
  const outHtml = out ? `<div class="sc-out ${out.cls}"><span class="dot"></span>${escapeHtml(out.label)}</div>` : '';
  const el = document.createElement('div');
  el.className = `sc-row ${st}`;
  el.innerHTML =
    `<div class="q"><div class="ql">${scLabel(qid).toUpperCase()} ${tag}</div>` +
    `<div class="qd">${detail}</div>${outHtml}</div>` +
    `<div class="pts">${ptsTxt}<small>/${bd.max}</small></div>`;
  return el;
}

// Compute this entry's rank by scoring every public entry the same way.
// `mode`: 'current' ranks by the live total; 'group' ranks by the frozen group-stage-only score.
async function computeRank(key, myMetric, mode) {
  try {
    const r = await fetch('/api/results'); const d = await r.json();
    if (!d || !d.ok || !d.submissions) return null;
    let better = 0;
    d.submissions.forEach(s => {
      const dg = isDefaultGroupOrder(s.answers.q8, groupsData);
      const sc = scoreEntry(s.answers, key, { defaultGroup: dg });
      const val = mode === 'group' ? sc.lockedGroup : sc.total;
      if (val > myMetric + 1e-6) better++;
    });
    return { rank: better + 1, of: d.submissions.length };
  } catch { return null; }
}

async function renderScorecard() {
  if (!VIEW_MODE) return;
  const { key, live } = await loadScoreData();
  if (!keyHasData({ answers: key })) { renderPage(); setupDrawer(); return; } // pre-tournament: plain picks
  const dg = (typeof isDefaultGroupOrder === 'function') && isDefaultGroupOrder(answers.q8, groupsData);
  const res = scoreEntry(answers, key, { defaultGroup: dg });
  const bdKeyFor = (q) => (q === 'q3a' || q === 'q3b') ? 'q3' : q;

  const order = Object.keys(SC_LABELS);
  // In group-stage mode, only the group-settling questions (q8/q9/q10) are in view —
  // they're frozen final, so nothing else from that bucket is relevant.
  const inScope = q => scMode !== 'group' || GROUP_QS.includes(q);
  const scored = order.filter(q => { const b = res.breakdown[q]; return b && b.graded && !b.skipped && inScope(q); })
    .sort((a, b) => {
      const rank = s => s === 'hit' ? 0 : s === 'partial' ? 1 : 2;
      const ra = rank(scStatus(res.breakdown[a])), rb = rank(scStatus(res.breakdown[b]));
      return ra - rb || res.breakdown[b].max - res.breakdown[a].max;
    });
  const pending = order.filter(q => { const b = res.breakdown[q]; return b && !b.graded && !b.skipped && inScope(q); })
    .sort((a, b) => res.breakdown[b].max - res.breakdown[a].max);

  // bracket = bonus on top of the 251 main entry (not rebalanced); only counts once open
  const brkActive = scMode !== 'group' && bracketStruct && bracketStruct.open && typeof scoreBracket === 'function';
  const brkOpts = (typeof bracketScoreOpts === 'function')
    ? bracketScoreOpts({ slug: getShareSlug(), created_at: ENTRY_CREATED_AT }, lateOverrides) : {};
  const brk = brkActive
    ? scoreBracket(answers.bracket, bracketStruct, (bracketState && bracketState.results) || {}, brkOpts) : { pts: 0, max: 0, byRound: {} };
  const total = scMode === 'group' ? Math.round(res.lockedGroup) : Math.round(res.total + brk.pts);
  const pend = scMode === 'group' ? 0 : Math.round(res.pendingMax + (brk.max - brk.pts));
  const earnW = scMode === 'group' ? 100 : Math.max(2, Math.round(total / (FULL_MAX + brk.max) * 100));
  const rankMetric = scMode === 'group' ? res.lockedGroup : res.total;

  const app = document.getElementById('app');
  app.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'sc-wrap';
  wrap.innerHTML =
    entryToggleHtml() +
    `<div class="sc-id"><span class="lbl">${t('sc_entry')}</span><span class="name">${escapeHtml(displayName(answers.name))}</span>` +
      `<button class="btn-make-own own" id="sc-makeown">${bracketWindow() && EDIT_TOKEN ? t('bracket_cta') : t('view_bracket')}</button></div>` +
    `<div class="lb-toggle lb-mode-toggle">` +
      `<button data-mode="current" class="${scMode === 'current' ? 'on' : ''}">${t('lb_mode_current')}</button>` +
      `<button data-mode="group" class="${scMode === 'group' ? 'on' : ''}">${t('lb_mode_group')}</button>` +
    `</div>` +
    `<div class="sc-hero">` +
      `<div class="sc-hero-tot"><div class="big">${total}</div><div class="cap">${t('sc_points')}</div><div class="rank" id="sc-rank"></div></div>` +
      `<div class="sc-hero-r">` +
        (scMode === 'group'
          ? `<div class="sc-barlbl"><span>${t('lb_group_note')}</span></div><div class="sc-bar"><div class="e" style="width:100%"></div></div>`
          : `<div class="sc-barlbl"><span>${t('sc_earned')} ${total}</span><span>${t('sc_inplay')} ${pend}</span></div>` +
            `<div class="sc-bar"><div class="e" style="width:${earnW}%"></div></div>`) +
        `<div class="sc-mini">` +
          `<div><div class="v">${Math.round(res.lockedGroup)}</div><div class="k">${t('sc_group')}</div></div>` +
          `<div><div class="v">${Math.round(res.lockedKO + brk.pts)}</div><div class="k">${t('sc_ko')}</div></div>` +
          `<div><div class="v">${scored.length}<small>/22</small></div><div class="k">${t('sc_scored_n')}</div></div>` +
        `</div></div></div>` +
    `<div class="sc-sec"><span class="h">${t('sc_scored_head')}</span><span class="ln"></span></div>` +
    `<div class="sc-rows" id="sc-scored"></div>` +
    `<div class="sc-sec"><span class="h" style="color:var(--grey-mid)">${t('sc_pending_head')}</span><span class="ln"></span>` +
      `<span class="meta">${pend} ${t('sc_pts_inplay')}</span></div>` +
    `<div class="sc-pend" id="sc-pending"></div>`;
  app.appendChild(wrap);

  const sc = wrap.querySelector('#sc-scored');
  scored.forEach(q => sc.appendChild(scRow(q, res.breakdown[q], key, live.has(bdKeyFor(q)))));
  if (!scored.length && !(brk.max && Object.keys(answers.bracket || {}).length))
    sc.innerHTML = `<div class="sc-row"><div class="q"><div class="qd" style="color:var(--grey-mid)">${t('sc_nothing')}</div></div></div>`;
  // bracket summary row — only once they've made bracket picks (hidden in group-stage view)
  if (brk.max && Object.keys(answers.bracket || {}).length) {
    const decided = Object.values(brk.byRound).reduce((a, r) => a + r.decided, 0);
    const st = !decided ? 'partial' : (brk.pts > 0 ? (brk.pts >= brk.max ? 'hit' : 'partial') : 'miss');
    const row = document.createElement('div');
    row.className = `sc-row ${st}`;
    row.innerHTML =
      `<div class="q"><div class="ql">${t('sec_bracket')} <span class="tag ${decided ? 'locked' : 'live'}">· ${decided ? t('sc_locked') : t('sc_live')}</span></div>` +
      `<div class="qd">${Object.keys(answers.bracket).length} ${t('br_picked')}${decided ? ` · ${decided} ${t('sc_decided') || 'decided'}` : ''}</div></div>` +
      `<div class="pts">${brk.pts > 0 ? '+' + Math.round(brk.pts) : '0'}<small>/${brk.max}</small></div>`;
    sc.appendChild(row);
  }

  const pe = wrap.querySelector('#sc-pending');
  pending.forEach(q => {
    const cell = document.createElement('div');
    cell.className = 'sc-pcell';
    cell.innerHTML = `<span class="t">${scLabel(q)} · <b>${escapeHtml(scPick(q))}</b></span><span class="m">${res.breakdown[q].max}</span>`;
    pe.appendChild(cell);
  });

  wrap.querySelector('#sc-makeown').addEventListener('click', startOwnEntry);
  wrap.querySelectorAll('.lb-mode-toggle button').forEach(b =>
    b.addEventListener('click', () => { scMode = b.dataset.mode; renderScorecard(); }));
  computeRank(key, rankMetric, scMode).then(r => {
    if (!r) return;
    const rankTxt = getLang() === 'pt' ? `${r.rank}º ${t('sc_of')} ${r.of}` : `${ordinal(r.rank)} ${t('sc_of')} ${r.of}`;
    wrap.querySelector('#sc-rank').textContent = rankTxt;
  });
}

function ordinal(n) { const s = ['th','st','nd','rd'], v = n % 100; return n + (s[(v - 20) % 10] || s[v] || s[0]); }

// ═══════════════════════════════════════ KNOCKOUT BRACKET PICKER
// The real winner of a match once it's been played (locks it). Null = still open.
function brResult(mid) { return (bracketState.results || {})[String(mid)] || null; }
// The two competing teams for a match (null where not yet known). A played match
// advances its REAL winner to the next round (for everyone); an open one advances
// whoever the user picked.
function brMatchTeams(mid) {
  const m = bracketStruct.matches[mid];
  if (!m) return [null, null];
  if (m.round === 'R32') {
    const r = (bracketState.r32_teams || {})[mid] || {};
    return [r.s1 || null, r.s2 || null];
  }
  const w = (slot) => (slot.t === 'W' && slot.m) ? (brResult(slot.m) || answers.bracket[slot.m] || null) : null;
  return [w(m.s1), w(m.s2)];
}
// Placeholder text for a slot whose team isn't known yet.
function brSlotLabel(slot) {
  if (slot.t === 'W' && slot.m) return `Winner of M${slot.m}`;
  if (slot.t === 'RU') return `Runner-up ${slot.g}`;
  if (slot.t === 'W')  return `Winner ${slot.g}`;
  if (slot.t === '3rd') return `3rd place`;
  return 'TBD';
}
// After any pick, clear downstream picks that are no longer valid (ascending pass:
// later matches depend only on earlier ones, so one forward sweep settles it).
function brCascade() {
  Object.keys(bracketStruct.matches).map(Number).sort((a, b) => a - b).forEach(n => {
    const mid = String(n), pick = answers.bracket[mid];
    if (!pick) return;
    const [t1, t2] = brMatchTeams(mid);
    if (pick !== t1 && pick !== t2) delete answers.bracket[mid];
  });
}
// Two-sided layout (final in the centre), top→bottom order per column so feeders
// line up. Derived from the fixed bracket.json tree; stable for WC2026.
const BR_LEFT = [
  { rk: 'R32', label: 'R32',  ids: [74, 77, 73, 75, 83, 84, 81, 82] },
  { rk: 'R16', label: 'R16',  ids: [89, 90, 93, 94] },
  { rk: 'QF',  label: 'QF',   ids: [97, 98] },
  { rk: 'SF',  label: 'Semi', ids: [101] },
];
const BR_RIGHT = [
  { rk: 'SF',  label: 'Semi', ids: [102] },
  { rk: 'QF',  label: 'QF',   ids: [99, 100] },
  { rk: 'R16', label: 'R16',  ids: [91, 92, 95, 96] },
  { rk: 'R32', label: 'R32',  ids: [76, 78, 79, 80, 86, 88, 85, 87] },
];
// Points per round, read LIVE from bracketStruct (it's fetched async, so a value
// captured at parse time would be empty — always look it up at render time).
function brPts(rk) { const r = (bracketStruct.rounds || []).find(x => x.key === rk); return r ? r.points : null; }

function brSideHtml(mid, team) {
  const tm = team && teamsData[team];
  const flag = tm && flagUrl(tm.iso2);
  const result = brResult(mid);                 // played? then the match is locked
  const cls = result ? (team && team === result ? ' won' : ' lost') + ' locked'
                      : (team && answers.bracket[mid] === team ? ' on' : '');
  const tbd = team ? '' : ' tbd';
  return `<div class="bs${cls}${tbd}" data-m="${mid}" data-t="${team ? escapeAttr(team) : ''}">` +
         (flag ? `<img src="${flag}" alt="">` : '<i></i>') +
         `<span>${team ? teamLabel(team) : t('br_tbd')}</span></div>`;
}
function brColEl(c, side) {
  const el = document.createElement('div');
  el.className = `bc ${side}${c.rk === 'SF' ? ' sf' : ''}`;
  const sfBoost = c.rk === 'SF' && isLateWindow();
  el.innerHTML = `<div class="blab">${c.label}<em${sfBoost ? ' class="boost"' : ''}>+${sfBoost ? (2 + lateSfBonusAmount()) : (brPts(c.rk) || '')}</em></div>`;
  const wrap = document.createElement('div');
  wrap.className = 'bcw';
  c.ids.forEach(n => {
    const mid = String(n), [t1, t2] = brMatchTeams(mid);
    const mt = document.createElement('div');
    mt.className = 'bm';
    mt.innerHTML = brSideHtml(mid, t1) + brSideHtml(mid, t2);
    wrap.appendChild(mt);
  });
  el.appendChild(wrap);
  return el;
}
function renderBracketTree(tree) {
  tree.innerHTML = '';
  BR_LEFT.forEach(c => tree.appendChild(brColEl(c, 'L')));
  const [fa, fb] = brMatchTeams('104'), champ = answers.bracket['104'];
  const picked = Object.keys(answers.bracket).length;
  const cen = document.createElement('div');
  cen.className = 'bcen';
  cen.innerHTML =
    `<div class="blab">${t('br_final')}<em>+${brPts('final') || ''}</em></div>` +
    `<div class="bm fin">${brSideHtml('104', fa)}${brSideHtml('104', fb)}</div>` +
    `<div class="trophy">` +
      (champ ? `<div class="tcup">🏆</div><div class="tname">${teamLabel(champ)}</div><div class="tsub">${t('sc_champion')}</div>`
             : `<div class="tsub">${picked} / 31 ${t('br_picked')}</div>`) +
    `</div>`;
  tree.appendChild(cen);
  BR_RIGHT.forEach(c => tree.appendChild(brColEl(c, 'R')));
}
function buildBracketSection() {
  const sec = makeSection('', t('sec_bracket') || 'Knockout bracket', 'knockout');
  sec.id = 'bracket-sec';
  const body = sec.querySelector('.section-body');
  const intro = document.createElement('p');
  intro.className = 'br-intro';
  intro.textContent = t('bracket_intro') ||
    'Optional bonus: tap a team to advance them through the bracket — winners flow to the centre. Points grow each round (Round of 32 → final). Scroll sideways to see it all.';
  body.appendChild(intro);
  // Points key: spell out what each round is worth so the bracket's scoring is obvious.
  // Built from BR_PTS (data/bracket.json) so it never drifts from the real values.
  const late = isLateWindow();
  const rounds = [['R32','R32'],['R16','R16'],['QF','QF'],['SF','SF'],['final', t('br_pts_final') || 'Final']];
  const key = document.createElement('div');
  key.className = 'br-key';
  key.innerHTML = `<span class="br-key-lbl">${t('br_pts_lbl') || 'Points per correct pick'}</span>` +
    rounds.map(([rk, lab]) => {
      const p = brPts(rk); if (p == null) return '';
      const boost = late && rk === 'SF';
      return `<span class="bk${boost ? ' boost' : ''}">${lab} <b>${boost ? `2<i>→</i>${2 + lateSfBonusAmount()}` : p}</b></span>`;
    }).join('');
  body.appendChild(key);
  // Once the first R32 game has kicked off (Sun 3pm ET), anyone still submitting before
  // the Monday 1pm lock gets the semifinal compensation — explain it isn't a penalty.
  if (late) {
    const bonus = document.createElement('div');
    bonus.className = 'br-bonus';
    bonus.innerHTML = `<span class="br-bonus-spark">+${lateSfBonusAmount()}</span>${t('br_sf_bonus')}`;
    body.appendChild(bonus);
  }
  const scroll = document.createElement('div');
  scroll.className = 'br-scroll';
  const tree = document.createElement('div');
  tree.className = 'br-tree';
  scroll.appendChild(tree);
  body.appendChild(scroll);
  renderBracketTree(tree);
  if (!VIEW_MODE) {
    tree.addEventListener('click', (e) => {
      const cell = e.target.closest('.bs');
      if (!cell || cell.classList.contains('tbd') || cell.classList.contains('locked')) return; // played = locked
      const mid = cell.dataset.m, team = cell.dataset.t;
      answers.bracket[mid] = (answers.bracket[mid] === team) ? undefined : team;
      if (!answers.bracket[mid]) delete answers.bracket[mid];
      brCascade();
      renderBracketTree(tree);
    });
  }
  return sec;
}

// ═══════════════════════════════════════ VALIDATION
// Wordle-style lock: EVERY question is required. `bad` = invalid data,
// `missing` = unanswered. Both block; there is no "submit with blanks".
function validate() {
  const bad = [], missing = [];

  if (!answers.name)    missing.push(t('f_name'));
  if (!answers.email)   missing.push(t('f_email'));
  else if (!answers.email.includes('@')) bad.push(t('err_email'));
  if (!answers.country) missing.push(t('f_country'));

  // Bracket window: group-stage picks are locked (not editable), so only identity
  // is required — the bracket itself is an optional bonus.
  if (bracketWindow()) return { bad, missing: [...new Set(missing)] };

  [['q1',1],['q2',2],['q3a',3],['q3b',3],['q4',4],['q5',5],['q6',6],['q7',7]]
    .forEach(([k, n]) => { if (!answers[k]) missing.push('Q' + n); });

  const f4 = FINAL4_IDS.map(k => answers[k]).filter(Boolean);
  if (new Set(f4).size < f4.length) bad.push(t('err_dup'));

  if (Object.keys(answers.q8).length < Object.keys(groupsData).length) bad.push(t('err_groups'));

  [['q9',9],['q10',10],['q11',11],['q12',12],['q13',13],['q14',14],['q15',15],['q16',16]]
    .forEach(([k, n]) => { if (!answers[k]) missing.push('Q' + n); });
  [['q17',17],['q18',18],['q19',19],['q20',20],['q21',21],['q22',22]]
    .forEach(([k, n]) => { if (!answers[`${k}_player`]) missing.push('Q' + n); });

  return { bad, missing: [...new Set(missing)] };
}

// ═══════════════════════════════════════ SUBMIT GATE → CONFIRM
function handleSubmit() {
  const { bad, missing } = validate();
  const panel = document.getElementById('error-panel');
  const list  = document.getElementById('error-list');

  if (bad.length || missing.length) {
    const items = [...bad];
    if (missing.length) items.push(`${t('required_all')} ${missing.join(', ')}`);
    list.innerHTML = items.map(e => `<li>${e}</li>`).join('');
    panel.classList.add('visible');
    panel.scrollIntoView({ behavior:'smooth', block:'nearest' });
    return;
  }

  // All good → show the irreversible-lock confirmation.
  panel.classList.remove('visible');
  document.getElementById('btn-submit').style.display = 'none';
  const cp = document.getElementById('confirm-panel');
  cp.style.display = 'block';
  cp.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function cancelConfirm() {
  document.getElementById('confirm-panel').style.display = 'none';
  document.getElementById('btn-submit').style.display = '';
}

// ═══════════════════════════════════════ ACTUAL SUBMISSION + SHARE LINK
async function doSubmit() {
  const { bad, missing } = validate();
  if (bad.length || missing.length) { cancelConfirm(); handleSubmit(); return; }

  const confirmBtn = document.getElementById('btn-confirm');
  confirmBtn.disabled = true;
  confirmBtn.textContent = t('submit_ing');

  // Full record (incl. email) goes to the backend; the share link never carries email.
  const payload = { ...answers, displayName: displayName(answers.name),
                    lang: getLang(), hidden: hideEntry, submitted_at: new Date().toISOString() };
  if (ENTRY_CODE) payload.code = ENTRY_CODE;
  if (EDIT_TOKEN) payload.token = EDIT_TOKEN;   // authorizes editing this specific entry

  let serverSlug = null, serverToken = '';
  if (!SUBMIT_URL) {
    console.log('📋 Submission payload (dev mode):\n', JSON.stringify(payload, null, 2));
  } else {
    try {
      const resp = await fetch(SUBMIT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      let data = null;
      try { data = await resp.json(); } catch (e) { /* non-JSON (e.g. static dev) */ }

      // Only an explicit server rejection blocks the lock-in.
      if (data && data.ok === false) {
        confirmBtn.disabled = false;
        confirmBtn.textContent = t('confirm_yes');
        const msg = data.error === 'closed'        ? t('entries_closed')
                  : data.error === 'bad_code'      ? t('bad_code')
                  : data.error === 'bad_token'     ? t('err_bad_token')
                  : data.error === 'use_your_link' ? t('err_use_link')
                  : t('toast_fail');
        showToast(msg, true);
        return;
      }
      if (data && data.ok && data.slug) { serverSlug = data.slug; serverToken = data.token || ''; }
    } catch (e) {
      // Network error — the self-contained link still works, so proceed with a warning.
      showToast(t('save_warn'), true);
    }
  }

  // Pretty short link when the server gave us a slug; carry the edit token so the
  // person can return to edit (their private link). View-only links omit the token.
  const url = serverSlug
    ? `${location.origin}/p/${serverSlug}${serverToken ? '?k=' + serverToken : ''}`
    : buildShareUrl();
  showShareScreen(url);
}

// Replace the submit section with the success / share-link screen.
function showShareScreen(url) {
  const sec = document.querySelector('.submit-section');
  sec.innerHTML = `
    <div class="share-screen">
      <div class="share-heading">🎉 ${t('share_heading')}</div>
      <div class="share-row">
        <input type="text" id="share-url" readonly value="${url}">
        <button class="btn-copy" id="btn-copy">${t('copy_link')}</button>
      </div>
      <a class="share-view" href="${url}">${t('view_my')}</a>
    </div>`;
  const input = sec.querySelector('#share-url');
  const copy  = sec.querySelector('#btn-copy');
  copy.addEventListener('click', async () => {
    try { await navigator.clipboard.writeText(url); }
    catch (e) { input.select(); document.execCommand('copy'); }
    copy.textContent = t('copy_done');
    setTimeout(() => copy.textContent = t('copy_link'), 1800);
  });
  // A #s= link is same-path (hash only) so it won't reload — force it. A /p/<slug>
  // link is a real navigation, so let the browser handle it.
  sec.querySelector('.share-view').addEventListener('click', () => {
    if (url.includes('#')) setTimeout(() => location.reload(), 30);
  });
  sec.scrollIntoView({ behavior:'smooth', block:'center' });
}

// "Make your own" from a shared view → go to the blank form at the site root.
function startOwnEntry() {
  // During the bracket window, editing a shared entry keeps its (locked) group
  // picks and lets the person add bracket picks in place — no fresh reload.
  if (VIEW_MODE && bracketWindow() && EDIT_TOKEN) {   // only the owner's link can edit in place
    VIEW_MODE = false;
    renderPage();
    setupDrawer();
    applyBracketWindowLock();
    window.scrollTo(0, 0);
    return;
  }
  location.href = location.origin + '/';
}

// In the bracket window, freeze everything except identity + the bracket section,
// so locked group/prop/player picks can't change but the bracket stays editable.
function applyBracketWindowLock() {
  if (VIEW_MODE || !bracketWindow()) return;
  const bracket = document.getElementById('bracket-sec');
  const cards = [...document.querySelectorAll('.section-card')];
  const idCard = cards.find(c => c.querySelector('.identity-grid'));
  const locked = cards.filter(c => c.id !== 'bracket-sec' && c !== idCard); // the 22 group/prop/player Qs
  const isNew = !answers.q1;                          // no group picks → brand-new bracket-only entrant

  // Bracket goes right under identity so it's the first thing (no endless scroll).
  if (bracket && idCard && idCard.parentNode) idCard.parentNode.insertBefore(bracket, idCard.nextSibling);

  if (isNew) { locked.forEach(c => c.remove()); return; }   // new user: only the bracket

  // Existing user: freeze the 22 locked picks and tuck them behind a toggle.
  locked.forEach(c => {
    c.querySelectorAll('select, input, button, .group-team-item, .yesno-label, .band-pill, .pcard')
      .forEach(el => { if ('disabled' in el) el.disabled = true; el.style.pointerEvents = 'none'; });
    c.style.opacity = '0.62';
  });
  if (locked.length && !document.getElementById('locked-toggle')) {
    const anchor = locked[0];
    const tog = document.createElement('button');
    tog.id = 'locked-toggle'; tog.type = 'button'; tog.className = 'locked-toggle';
    tog.textContent = t('show_original');
    const box = document.createElement('div');
    box.id = 'locked-box'; box.style.display = 'none';
    anchor.parentNode.insertBefore(tog, anchor);
    anchor.parentNode.insertBefore(box, anchor);
    locked.forEach(c => box.appendChild(c));
    tog.addEventListener('click', () => {
      const open = box.style.display !== 'none';
      box.style.display = open ? 'none' : 'block';
      tog.textContent = open ? t('show_original') : t('hide_original');
    });
  }
}

// ═══════════════════════════════════════ COUNTDOWN
function fmtCountdown(diff) {
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000)  / 60000);
  const s = Math.floor((diff % 60000)    / 1000);
  return `${d}d ${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
}
function startCountdown() {
  const el = document.getElementById('countdown');
  function tick() {
    const diff = LOCK_TIME - Date.now();
    if (diff <= 0) {
      // Group stage locked. If the bracket window is open, submission stays enabled.
      if (bracketWindow()) {
        const lockAt = isLateOverrideActive() ? LATE_DEADLINE : BRACKET_LOCK;
        el.textContent = `${t('bracket_closes')} ${fmtCountdown(lockAt - Date.now())}`;
        el.style.color = 'var(--gold)';
        const btn = document.getElementById('btn-submit');
        if (btn) { btn.disabled = false; }
        setTimeout(tick, 1000);
        return;
      }
      el.textContent  = t('countdown_locked');
      el.style.color  = '#f87171';
      const btn = document.getElementById('btn-submit');
      if (btn) { btn.disabled = true; btn.textContent = t('submit_locked'); }
      return;
    }
    el.textContent = fmtCountdown(diff);
    setTimeout(tick, 1000);
  }
  tick();
}

// ═══════════════════════════════════════ TOAST
function showToast(text, isError) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.className = 'toast' + (isError ? ' error' : '');
  requestAnimationFrame(() => {
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 4200);
  });
}

// ═══════════════════════════════════════ BOOT
init();
</script>
